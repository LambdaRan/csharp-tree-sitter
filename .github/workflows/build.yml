name: build

on: [push]

jobs:
  # ── Native library builds (parallel) ──────────────────────────

  build-native-linux-x64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Build tree-sitter for linux-x64
        run: NativeLibs/build/tree-sitter/make-linux.sh linux-x64
      - uses: actions/upload-artifact@v4
        with:
          name: native-linux-x64
          path: NativeLibs/out/

  build-native-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Build tree-sitter for linux-arm64
        run: NativeLibs/build/tree-sitter/make-linux.sh linux-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: native-linux-arm64
          path: NativeLibs/out/

  build-native-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Build tree-sitter for osx-arm64
        run: NativeLibs/build/tree-sitter/make-macos.sh osx-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: native-macos-arm64
          path: NativeLibs/out/

  build-native-macos-intel:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Build tree-sitter for osx-x64
        run: NativeLibs/build/tree-sitter/make-macos.sh osx-x64
      - uses: actions/upload-artifact@v4
        with:
          name: native-macos-intel
          path: NativeLibs/out/

  build-native-windows-x64:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Build tree-sitter for win-x64
        run: NativeLibs\build\tree-sitter\make-windows.bat win-x64
      - uses: actions/upload-artifact@v4
        with:
          name: native-windows-x64
          path: NativeLibs/out/

  # ── Pack NuGet packages ──────────────────────────────────────

  build-and-pack:
    runs-on: ubuntu-latest
    needs:
      - build-native-linux-x64
      - build-native-linux-arm64
      - build-native-macos-arm64
      - build-native-macos-intel
      - build-native-windows-x64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          merge-multiple: true
          path: NativeLibs/out

      - name: Pack TSBind
        run: dotnet pack TSBind/TSBind.csproj -c Release -p:VersionSuffix=ci.${{ github.run_number }}

      - name: Pack TSWrap
        run: dotnet pack TSWrap/TSWrap.csproj -c Release -p:VersionSuffix=ci.${{ github.run_number }}

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: |
            TSBind/bin/Release/*.nupkg
            TSWrap/bin/Release/*.nupkg
